<meta charset="UTF-8" />

<title>where3z Neon Red Kick Chat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;900&family=Orbitron:wght@700;900&display=swap');
  :root {
    --red:#ff1010; --red2:#b30000; --dark:rgba(0,0,0,.15); --white:#fff;
  }
  * { box-sizing:border-box; }
  html, body { margin:0; width:100%; height:100%; background:transparent; overflow:hidden; }
  body { font-family:'Tajawal', Arial, sans-serif; }
  .wrap { position:fixed; inset:0; display:flex; flex-direction:column; justify-content:flex-end; padding:28px 18px; gap:12px; }
  .brand { position:absolute; top:15px; right:18px; display:flex; align-items:center; gap:10px; opacity:.92; filter:drop-shadow(0 0 12px var(--red)); }
  .brand img { width:74px; height:56px; object-fit:contain; }
  .brand .txt { font-family:'Orbitron', sans-serif; color:var(--red); font-size:18px; letter-spacing:1px; text-shadow:0 0 8px var(--red), 0 0 18px var(--red); }
  #chat { display:flex; flex-direction:column; justify-content:flex-end; gap:18px; width:100%; }
  .msg { display:grid; grid-template-columns: 190px 1fr; gap:18px; align-items:center; animation:slideIn .45s ease-out both; filter: drop-shadow(0 0 9px rgba(255,0,0,.45)); }
  .name { justify-self:start; max-width:185px; direction:ltr; font-family:'Orbitron','Tajawal',sans-serif; font-weight:900; font-size:20px; line-height:1; color:var(--red); padding:10px 14px; border:2px solid var(--red); border-radius:8px; background:linear-gradient(180deg,rgba(45,0,0,.72),rgba(0,0,0,.45)); text-shadow:0 0 8px var(--red),0 0 18px var(--red); box-shadow:0 0 8px var(--red), inset 0 0 10px rgba(255,0,0,.35), 0 0 22px rgba(255,0,0,.55); clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .badge { font-size:14px; margin-left:6px; color:#fff; text-shadow:0 0 8px #fff; }
  .text { justify-self:end; direction:rtl; text-align:right; color:var(--white); font-size:21px; font-weight:800; line-height:1.35; padding:8px 4px; text-shadow:0 2px 4px #000, 0 0 10px rgba(255,255,255,.35); }
  .dot { color:var(--red); margin-right:12px; text-shadow:0 0 10px var(--red),0 0 20px var(--red); }
  .fadeout { animation:fadeOut .55s ease-in forwards; }
  @keyframes slideIn { from {opacity:0; transform:translateX(42px) scale(.96);} to {opacity:1; transform:translateX(0) scale(1);} }
  @keyframes fadeOut { to {opacity:0; transform:translateY(-16px);} }
</style>

<script>
const params = new URLSearchParams(location.search);
const preview = params.get('preview') === '1' || !params.has('live');
const MAX_MESSAGES = Number(params.get('max') || 6);
const HIDE_AFTER = Number(params.get('hide') || 18000);
const chat = document.getElementById('chat');
function safe(s){return String(s ?? '').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function addChatMessage(user, message, opts={}){
  const el=document.createElement('div'); el.className='msg';
  const badge = opts.badge ? `<span class="badge">${safe(opts.badge)}</span>` : '';
  el.innerHTML=`<div class="name">${safe(user)}${badge}</div><div class="text"><span class="dot">•</span>${safe(message)}</div>`;
  chat.appendChild(el);
  while(chat.children.length>MAX_MESSAGES) chat.firstElementChild.remove();
  setTimeout(()=>{el.classList.add('fadeout'); setTimeout(()=>el.remove(),600);}, HIDE_AFTER);
}
window.addChatMessage = addChatMessage;

// Preview messages. In OBS use: file.html?preview=1
if(preview){
 const samples=[['Special ✕','استغفرالله واتوب اليه'],['Meshal','سبحان الله وبحمده، سبحان الله العظيم'],['Naif','لا حول ولا قوة إلا بالله','♛'],['Rayan','لا اله الا الله'],['Faisal','سلام عليكم'],['Mshllm','بث اسطوري ماشاء الله','♛']];
 let i=0; samples.forEach((m,k)=>setTimeout(()=>addChatMessage(m[0],m[1],{badge:m[2]||''}), k*650));
 setInterval(()=>{ const m=samples[i++%samples.length]; addChatMessage(m[0],m[1],{badge:m[2]||''}); },3500);
}
